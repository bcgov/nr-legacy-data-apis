services:
  oracle-free:
    image: gvenzl/oracle-free:23
    container_name: legacy-oracle
    restart: unless-stopped
    ports:
      - "${ORACLE_HOST_PORT:-1522}:1521"
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-change-me}
      APP_USER: ${ORACLE_APP_USER:-legacy_app}
      APP_USER_PASSWORD: ${ORACLE_APP_PASSWORD:-legacy_app_password}
    healthcheck:
      test: [ "CMD", "healthcheck.sh" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./oracle/initdb:/container-entrypoint-initdb.d:ro

  ords:
    image: container-registry.oracle.com/database/ords:latest
    container_name: legacy-ords
    restart: unless-stopped
    depends_on:
      oracle-free:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DBHOST: ${ORDS_DB_HOST:-oracle-free}
      DBPORT: ${ORDS_DB_PORT:-1521}
      DBSERVICENAME: ${ORDS_DB_SERVICE:-FREEPDB1}
      ORACLE_PWD: ${ORDS_SYS_PASSWORD:-${ORACLE_PASSWORD:-change-me}}
      FORCE_SECURE: ${ORDS_FORCE_SECURE:-FALSE}
      DEBUG: ${ORDS_DEBUG:-FALSE}
    volumes:
      - ./ords/config:/etc/ords/config

  db2rest:
    image: kdhrubo/db2rest:v1.6.8
    container_name: legacy-db2rest
    restart: unless-stopped
    depends_on:
      oracle-free:
        condition: service_healthy
    ports:
      - "${DB2REST_HOST_PORT:-8081}:8080"
    environment:
      DB_URL: ${DB2REST_URL:-jdbc:oracle:thin:@//oracle-free:1521/FREEPDB1}
      DB_USER: ${DB2REST_USER:-legacy_app}
      DB_PASSWORD: ${DB2REST_PASSWORD:-legacy_app_password}
      DB_ID: ${DB2REST_ID:-oracle}
      INCLUDED_SCHEMAS: ${DB2REST_INCLUDED_SCHEMAS:-LEGACY_APP}
      DEFAULT_FETCH_LIMIT: ${DB2REST_FETCH_LIMIT:-100}

  dab:
    image: mcr.microsoft.com/azure-databases/data-api-builder:1.7.93
    container_name: legacy-dab
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      SQLSERVER_CONNECTION_STRING: ${SQLSERVER_CONNECTION_STRING:-}
    volumes:
      - ./dab/dab-config.json:/App/dab-config.json:ro

volumes:
  oracle-data:
